name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example v0.3.0-rc1)"
        required: true
        type: string
      publish_release:
        description: "Publish GitHub release"
        required: true
        default: false
        type: boolean
      run_optional_plugin_matrix:
        description: "Run optional plugin compatibility matrix"
        required: true
        default: false
        type: boolean

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run release candidate gate
        env:
          RUN_OPTIONAL_PLUGIN_MATRIX: ${{ github.event_name == 'workflow_dispatch' && inputs.run_optional_plugin_matrix && '1' || '0' }}
        run: bash scripts/release_candidate_gate.sh

      - name: Upload plugin compatibility report
        uses: actions/upload-artifact@v4
        with:
          name: plugin-compatibility-report
          path: /tmp/chronicle-plugin-compatibility.json

  build-release-notes:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate release notes
        env:
          RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
        run: |
          PYTHONPATH=src python scripts/generate_release_notes.py --version "${RELEASE_VERSION}" --output RELEASE_NOTES.md

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.md

  publish-release:
    runs-on: ubuntu-latest
    needs: build-release-notes
    if: github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
          draft: ${{ github.event_name == 'workflow_dispatch' }}
