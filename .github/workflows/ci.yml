name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        if: ${{ !env.ACT }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show act Python runtime
        if: ${{ env.ACT }}
        run: python3 --version

      - name: Install package and test dependencies
        if: ${{ !env.ACT }}
        run: |
          python3 -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Note act isolated install path
        if: ${{ env.ACT }}
        run: echo "act path uses scripts/smoke_clean_checkout.sh to create its own virtualenv"

      - name: Run clean-checkout smoke baseline
        run: bash scripts/smoke_clean_checkout.sh
